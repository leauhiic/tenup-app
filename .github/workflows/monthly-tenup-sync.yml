name: Monthly TenUp sync

on:
  workflow_dispatch:
  schedule:
    # Runs on the 7th of every month at 06:00 UTC.
    - cron: "0 6 7 * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Sync TenUp tournaments
        env:
          TENUP_PERSON_ID: ${{ secrets.TENUP_PERSON_ID }}
          TENUP_CLASSEMENT_URL: ${{ secrets.TENUP_CLASSEMENT_URL }}
          TENUP_STORAGE_STATE_JSON: ${{ secrets.TENUP_STORAGE_STATE_JSON }}
          TENUP_API_URL: ${{ secrets.TENUP_API_URL }}
          TENUP_ADMIN_API_KEY: ${{ secrets.TENUP_ADMIN_API_KEY }}
        run: npm run sync:tenup
