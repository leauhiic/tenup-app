<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>TenUp Sync</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <div class="brand">TEN<span>UP</span></div>
        <div class="subtitle">Sync extension</div>
      </header>

      <form id="settings-form">
        <label>
          ID TenUp
          <input
            id="person-id"
            name="personId"
            inputmode="numeric"
            autocomplete="off"
            required
          />
        </label>
        <p class="hint">
          L'extension ouvre automatiquement la page classement avec cet ID et
          rattache l'import au compte valide correspondant.
        </p>

        <label class="check">
          <input id="auto-sync" name="autoSyncEnabled" type="checkbox" />
          <span>Verifier automatiquement le 7 du mois</span>
        </label>

        <div class="actions">
          <button id="save" type="submit">Enregistrer</button>
          <button id="open-tenup" type="button" class="secondary">
            Ouvrir TenUp
          </button>
        </div>
      </form>

      <button id="test-read" type="button" class="secondary wide">
        Tester la lecture
      </button>
      <button id="sync-now" type="button" class="primary">
        Synchroniser maintenant
      </button>

      <section id="status" class="status muted">Chargement...</section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
